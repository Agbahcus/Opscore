{% extends "base.html" %}
{% block content %}
  <div class="page-header">
    <div>
      <div class="muted">Branch Management</div>
      <h1 class="page-title">Branches</h1>
    </div>
    <a class="btn btn-primary" href="{% url 'adjustment_create' %}">New Adjustment</a>
  </div>

  <section class="panel">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Location</th>
          <th>Manager</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for branch in branches %}
          <tr>
            <td>{{ branch.name }}</td>
            <td>{{ branch.location }}</td>
            <td>{{ branch.manager_name }}</td>
            <td><a href="{% url 'branch_detail' branch.pk %}">View</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
{% endblock %}
