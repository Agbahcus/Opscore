{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpsCore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --sidebar-bg: #0B1220;
      --sidebar-bg-2: #111827;
      --sidebar-text: #94A3B8;
      --sidebar-text-active: #FFFFFF;
      --sidebar-accent-bar: #38BDF8;
      --content-bg: #F5F7FB;
      --content-glow: rgba(37, 99, 235, 0.09);
      --card-bg: #FFFFFF;
      --card-bg-soft: #FBFDFF;
      --border: #E4E9F2;
      --border-strong: #CBD5E1;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --action-primary: #2563EB;
      --action-primary-hover: #1D4ED8;
      --action-primary-text: #FFFFFF;
      --status-success: #059669;
      --status-success-bg: #D1FAE5;
      --status-warning: #D97706;
      --status-warning-bg: #FEF3C7;
      --status-danger: #DC2626;
      --status-danger-bg: #FEE2E2;
      --status-neutral: #64748B;
      --status-neutral-bg: #E2E8F0;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    html { background: var(--content-bg); }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 32%),
        radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.08), transparent 28%),
        var(--content-bg);
    }
    a { color: var(--action-primary); text-decoration-thickness: 1px; text-underline-offset: 2px; }
    img, svg { max-width: 100%; }
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: 272px;
      background: linear-gradient(180deg, var(--sidebar-bg), var(--sidebar-bg-2));
      color: var(--sidebar-text);
      padding: 20px 16px;
      position: fixed;
      inset: 0 auto 0 0;
      overflow-y: auto;
      border-right: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
    }
    .brand-card {
      padding: 16px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 18px;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38BDF8, #2563EB);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(37,99,235,0.35);
    }
    .brand-name {
      color: white;
      font-weight: 700;
      line-height: 1.1;
    }
    .brand-sub {
      color: var(--sidebar-text);
      font-size: 12px;
      margin-top: 4px;
    }
    .workspace-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .workspace-chip {
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 10px 12px;
    }
    .workspace-chip strong {
      display: block;
      color: white;
      font-size: 18px;
      line-height: 1;
      margin-bottom: 4px;
      font-family: "JetBrains Mono", monospace;
    }
    .workspace-chip span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--sidebar-text);
    }
    .nav-group {
      margin-top: 20px;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748B;
      margin: 0 0 10px 12px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--sidebar-text);
      text-decoration: none;
      padding: 12px 14px;
      margin-bottom: 4px;
      border-radius: 12px;
      position: relative;
      transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
    }
    .nav-item:hover {
      color: white;
      background: rgba(255,255,255,0.05);
      transform: translateX(2px);
    }
    .nav-item.active {
      color: var(--sidebar-text-active);
      background: rgba(56, 189, 248, 0.12);
    }
    .nav-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 999px;
      background: var(--sidebar-accent-bar);
    }
    .nav-item [data-lucide] { width: 18px; height: 18px; }
    .content {
      margin-left: 272px;
      width: calc(100% - 272px);
      padding: 24px 28px 32px;
    }
    .content-inner {
      max-width: 1480px;
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .crumb {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .page-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .page-subtitle {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: var(--space-6);
      padding: 18px 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }
    .page-header .page-title { font-size: 24px; }
    .panel {
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 0;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .section-meta {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: linear-gradient(180deg, var(--card-bg), var(--card-bg-soft));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .metric-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .metric-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 24px;
      font-weight: 600;
      margin: 0;
    }
    .metric-sub {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: rgba(241,245,249,0.8);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: left;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border-strong);
      white-space: nowrap;
    }
    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }
    tbody tr:hover { background: rgba(248, 250, 252, 0.9); }
    .mono { font-family: "JetBrains Mono", monospace; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      display: inline-block;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 10px;
      padding: 9px 14px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--action-primary); color: white; box-shadow: 0 10px 18px rgba(37,99,235,0.18); }
    .btn-primary:hover { background: var(--action-primary-hover); }
    .btn-secondary { background: rgba(255,255,255,0.9); border-color: var(--border-strong); color: var(--text-primary); }
    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-secondary);
    }
    .alert {
      background: var(--status-warning-bg);
      border-left: 3px solid var(--status-warning);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .status-in_stock { color: var(--status-success); background: var(--status-success-bg); }
    .status-low_stock { color: var(--status-warning); background: var(--status-warning-bg); }
    .status-out_of_stock { color: var(--status-danger); background: var(--status-danger-bg); }
    .status-draft { color: var(--status-neutral); background: var(--status-neutral-bg); }
    .status-sent { color: var(--status-warning); background: var(--status-warning-bg); }
    .status-partially_received { color: var(--action-primary); background: #DBEAFE; }
    .status-fully_received { color: var(--status-success); background: var(--status-success-bg); }
    .status-cancelled { color: var(--status-danger); background: var(--status-danger-bg); }
    .qty-ok { color: var(--status-success); font-family: "JetBrains Mono", monospace; font-weight: 600; }
    .qty-low { color: var(--status-warning); font-family: "JetBrains Mono", monospace; font-weight: 600; }
    .qty-zero { color: var(--status-danger); font-family: "JetBrains Mono", monospace; font-weight: 600; }
    .field-row { margin: 0 0 12px; }
    .field-row label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
    .field-row input, .field-row select, .field-row textarea,
    form p input, form p select, form p textarea,
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: white;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .field-row input:focus, .field-row select:focus, .field-row textarea:focus,
    form p input:focus, form p select:focus, form p textarea:focus,
    input[type="text"]:focus, input[type="number"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
      border-color: rgba(37,99,235,0.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
    }
    form p {
      margin: 0 0 12px;
    }
    form p label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    input[name$="-DELETE"] { display: none; }
    .errorlist {
      margin: 0 0 8px;
      padding-left: 18px;
      color: var(--status-danger);
      font-size: 12px;
    }
    .suggestions {
      position: absolute;
      z-index: 20;
      background: white;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      width: 100%;
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-top: 6px;
    }
    .suggestion-item {
      width: 100%;
      display: block;
      text-align: left;
      padding: 10px 12px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: white;
      cursor: pointer;
      color: var(--text-primary);
    }
    .suggestion-item:hover { background: var(--content-bg); }
    .shell-toggle {
      display: none;
    }
    .mobile-topbar {
      display: none;
    }
    .desktop-only { display: initial; }
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        z-index: 50;
        width: 280px;
      }
      body.sidebar-open .sidebar { transform: translateX(0); }
      .content { margin-left: 0; width: 100%; padding: 16px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .grid-4 { grid-template-columns: 1fr; }
      .shell-toggle {
        display: inline-flex;
      }
      .mobile-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .desktop-only { display: none; }
      .page-header {
        padding: 16px;
        margin-bottom: 16px;
      }
      .panel-head {
        padding: 16px 16px 0;
        align-items: flex-start;
        flex-direction: column;
      }
      .card {
        padding: 16px;
      }
      .page-title {
        font-size: 22px;
      }
      table {
        font-size: 12px;
      }
      thead th,
      tbody td {
        padding: 10px 12px;
      }
      .btn {
        width: auto;
      }
      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }
      .page-header .top-actions {
        margin-top: 4px;
      }
    }
    @media (max-width: 640px) {
      .grid-4 { grid-template-columns: 1fr; }
      .workspace-meta { grid-template-columns: 1fr; }
      .brand-card { padding: 14px; }
      .nav-item { padding: 11px 12px; }
      .page-subtitle, .section-meta { font-size: 12px; }
      .metric-value { font-size: 22px; }
      .page-header {
        gap: 12px;
      }
      .page-header > div:first-child {
        width: 100%;
      }
      .page-header .top-actions {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }
      .page-header .btn,
      .top-actions .btn {
        width: 100%;
      }
      .content { padding: 12px; }
      .content-inner { padding-bottom: 12px; }
    }
  </style>
</head>
<body>
  <div class="mobile-topbar">
    <button class="btn btn-secondary shell-toggle" type="button" aria-label="Toggle navigation" data-sidebar-toggle>
      <i data-lucide="menu"></i>
    </button>
    <div class="mono" style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">OpsCore</div>
    <div style="width:40px;"></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="brand-row">
          <div class="brand-mark">OC</div>
          <div>
            <div class="brand-name">OpsCore</div>
            <div class="brand-sub">MedCore Pharmacy Group</div>
          </div>
        </div>
        <div class="workspace-meta">
          <div class="workspace-chip">
            <strong>3</strong>
            <span>Branches</span>
          </div>
          <div class="workspace-chip">
            <strong>20</strong>
            <span>Products</span>
          </div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-label">Operations</div>
        <a class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
          <i data-lucide="layout-grid"></i><span>Dashboard</span>
        </a>
        <a class="nav-item {% if request.resolver_match.url_name == 'inventory_view' %}active{% endif %}" href="{% url 'inventory_view' %}">
          <i data-lucide="package"></i><span>Inventory</span>
        </a>
        <a class="nav-item {% if request.resolver_match.url_name == 'purchase_orders_list' or request.resolver_match.url_name == 'purchase_order_detail' or request.resolver_match.url_name == 'purchase_order_create' %}active{% endif %}" href="{% url 'purchase_orders_list' %}">
          <i data-lucide="file-text"></i><span>Purchase Orders</span>
        </a>
        <a class="nav-item {% if request.resolver_match.url_name == 'suppliers_list' or request.resolver_match.url_name == 'supplier_detail' %}active{% endif %}" href="{% url 'suppliers_list' %}">
          <i data-lucide="truck"></i><span>Suppliers</span>
        </a>
      </div>

      <div class="nav-group">
        <div class="nav-label">Catalog</div>
        <a class="nav-item {% if request.resolver_match.url_name == 'products_list' or request.resolver_match.url_name == 'product_detail' %}active{% endif %}" href="{% url 'products_list' %}">
          <i data-lucide="tag"></i><span>Products</span>
        </a>
        <a class="nav-item {% if request.resolver_match.url_name == 'branches_list' or request.resolver_match.url_name == 'branch_detail' %}active{% endif %}" href="{% url 'branches_list' %}">
          <i data-lucide="building-2"></i><span>Branches</span>
        </a>
        <a class="nav-item {% if request.resolver_match.url_name == 'reports_index' or request.resolver_match.url_name == 'report_detail' %}active{% endif %}" href="{% url 'reports_index' %}">
          <i data-lucide="bar-chart-3"></i><span>Reports</span>
        </a>
      </div>
    </aside>

    <main class="content">
      <div class="content-inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script>
    lucide.createIcons();
    document.addEventListener('click', function (event) {
      const sidebarToggle = event.target.closest('[data-sidebar-toggle]');
      if (sidebarToggle) {
        document.body.classList.toggle('sidebar-open');
        return;
      }

      if (document.body.classList.contains('sidebar-open') && !event.target.closest('.sidebar') && !event.target.closest('[data-sidebar-toggle]')) {
        document.body.classList.remove('sidebar-open');
      }

      const choice = event.target.closest('[data-product-choice]');
      if (!choice) return;
      const prefix = choice.getAttribute('data-prefix');
      const input = document.getElementById(`id_${prefix}-product_query`);
      const hidden = document.getElementById(`id_${prefix}-product_id`);
      if (input && hidden) {
        input.value = choice.getAttribute('data-product-label');
        hidden.value = choice.getAttribute('data-product-id');
      }
      const host = document.getElementById(`product-suggestions-${prefix}`);
      if (host) host.innerHTML = '';
    });
  </script>
</body>
</html>
